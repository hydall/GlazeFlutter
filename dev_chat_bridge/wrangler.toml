name = "glaze-dev-chat"
main = "src/index.js"
compatibility_date = "2025-01-01"

# KV storage for topic mappings + the dev-reply queue.
# After `wrangler kv namespace create CHAT`, paste the printed id below.
kv_namespaces = [
  { binding = "CHAT", id = "PASTE_KV_ID_HERE" }
]

# Non-secret var. The private supergroup id (starts with -100...).
[vars]
GROUP_ID = "-100XXXXXXXXXX"

# Secrets (do NOT put here) — set via wrangler:
#   wrangler secret put BOT_TOKEN
#   wrangler secret put WEBHOOK_SECRET
