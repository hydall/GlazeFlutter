<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Glaze Chat</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { background: transparent;
      color: var(--text-color, #e0e0e0);
      font-family: var(--font-family, -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif);
      font-size: var(--font-size, 15px);
      letter-spacing: var(--letter-spacing, 0);
      overflow: hidden;
      height: 100%;
    }
    #chat-container {
      width: 100%; height: 100vh;
      overflow-y: auto; overflow-x: hidden;
      -webkit-overflow-scrolling: touch;
      padding: 0;
      background: transparent;
    }
    #chat-container::-webkit-scrollbar {
      display: none;
      width: 0;
    }
    #chat-container::-webkit-scrollbar-track {
      background: transparent;
    }
    #chat-container::-webkit-scrollbar-thumb {
      background: rgba(255,255,255,0.15);
      border-radius: 3px;
    }
    #loading-screen {
      position: fixed; inset: 0;
      display: flex; align-items: center; justify-content: center;
      background: transparent; z-index: 9999;
      transition: opacity 0.2s;
      pointer-events: none;
    }
    #loading-screen .app-loader-spinner {
      width: 40px;
      height: 40px;
      border: 3px solid rgba(255, 255, 255, 0.1);
      border-top-color: var(--primary-color, #7996ce);
      border-radius: 50%;
      animation: loaderSpin 0.8s linear infinite;
    }
    @keyframes loaderSpin {
      to { transform: rotate(360deg); }
    }
  </style>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="loading-screen"><div class="app-loader-spinner"></div></div>
  <div id="chat-header" class="hidden" aria-hidden="true">
    <div id="chat-header-back" class="chat-header-btn" role="button" aria-label="Back">
      <svg viewBox="0 0 24 24"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20z"/></svg>
    </div>
    <div id="chat-header-avatar" class="chat-header-avatar"></div>
    <div class="chat-header-titles">
      <div id="chat-header-name" class="chat-header-name"></div>
      <div id="chat-header-session" class="chat-header-session"></div>
    </div>
    <div id="chat-header-search" class="chat-header-btn" role="button" aria-label="Search">
      <svg viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27a6.5 6.5 0 1 0-.7.7l.27.28v.79l5 4.99L20.49 19zm-6 0A4.5 4.5 0 1 1 14 9.5 4.5 4.5 0 0 1 9.5 14z"/></svg>
    </div>
  </div>
  <div id="chat-container" class="layout-default"></div>

  <div id="scroll-to-bottom" class="hidden" role="button" aria-label="Scroll to bottom">
    <svg viewBox="0 0 24 24"><path d="M12 16.17L5.59 9.76L7 8.35L12 13.35L17 8.35L18.41 9.76L12 16.17Z"/></svg>
  </div>

  <div id="chat-input-bar" class="hidden mode-normal" aria-hidden="true">
    <!-- Attached image preview (normal mode) -->
    <div id="input-image-preview" class="hidden">
      <img id="input-image-img" alt="Attached image preview" />
      <div id="input-image-remove" role="button" aria-label="Remove image">
        <svg viewBox="0 0 24 24"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
      </div>
    </div>

    <!-- Guidance inline field (normal mode, when active) -->
    <div id="input-guidance" class="hidden">
      <svg class="input-guidance-icon" viewBox="0 0 24 24"><path d="M9 5v2h6.59L4 18.59 5.41 20 17 8.41V15h2V5H9z"/></svg>
      <textarea id="input-guidance-field" rows="1" placeholder=""></textarea>
    </div>

    <!-- Normal-mode compose pill -->
    <div id="input-pill" class="input-pill">
      <textarea id="chat-input-field" rows="1" placeholder="" enterkeyhint="enter" aria-multiline="true"></textarea>
    </div>

    <!-- Search-mode pill -->
    <div id="input-search" class="input-pill input-alt-pill">
      <svg class="input-alt-lead" viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27a6.5 6.5 0 1 0-.7.7l.27.28v.79l5 4.99L20.49 19zm-6 0A4.5 4.5 0 1 1 14 9.5 4.5 4.5 0 0 1 9.5 14z"/></svg>
      <span id="input-search-count" class="input-alt-label"></span>
      <div class="input-icon-btn" id="input-search-prev" role="button" aria-label="Previous match">
        <svg viewBox="0 0 24 24"><path d="M12 7.83L5.59 14.24L7 15.65L12 10.65L17 15.65L18.41 14.24L12 7.83Z"/></svg>
      </div>
      <div class="input-icon-btn" id="input-search-next" role="button" aria-label="Next match">
        <svg viewBox="0 0 24 24"><path d="M12 16.17L5.59 9.76L7 8.35L12 13.35L17 8.35L18.41 9.76L12 16.17Z"/></svg>
      </div>
    </div>

    <!-- Selection-mode pill -->
    <div id="input-selection" class="input-pill input-alt-pill">
      <div class="input-icon-btn" id="input-sel-cancel" role="button" aria-label="Cancel selection">
        <svg viewBox="0 0 24 24"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
      </div>
      <span id="input-sel-count" class="input-alt-label"></span>
      <div class="input-icon-btn" id="input-sel-hide" role="button" aria-label="Hide selected">
        <svg id="input-sel-hide-icon" viewBox="0 0 24 24"><path d="M12 7c2.76 0 5 2.24 5 5 0 .65-.13 1.26-.36 1.83l2.92 2.92c1.51-1.26 2.7-2.89 3.43-4.75-1.73-4.39-6-7.5-11-7.5-1.4 0-2.74.25-3.98.7l2.16 2.16C10.74 7.13 11.35 7 12 7zM2 4.27l2.28 2.28.46.46C3.08 8.3 1.78 10.02 1 12c1.73 4.39 6 7.5 11 7.5 1.55 0 3.03-.3 4.38-.84l.42.42L19.73 22 21 20.73 3.27 3 2 4.27zM7.53 9.8l1.55 1.55c-.05.21-.08.43-.08.65 0 1.66 1.34 3 3 3 .22 0 .44-.03.65-.08l1.55 1.55c-.67.33-1.41.53-2.2.53-2.76 0-5-2.24-5-5 0-.79.2-1.53.53-2.2zm4.31-.78l3.15 3.15.02-.16c0-1.66-1.34-3-3-3l-.17.01z"/></svg>
      </div>
      <div class="input-icon-btn input-icon-danger" id="input-sel-delete" role="button" aria-label="Delete selected">
        <svg viewBox="0 0 24 24"><path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/></svg>
      </div>
    </div>

    <!-- Buttons row (normal mode) -->
    <div id="input-buttons">
      <div class="input-actions-left">
        <div class="input-circle-btn" id="input-btn-magic" role="button" aria-label="Magic drawer">
          <svg viewBox="0 0 24 24"><path d="M19 9l1.25-2.75L23 5l-2.75-1.25L19 1l-1.25 2.75L15 5l2.75 1.25L19 9zm-7.5.5L9 4 6.5 9.5 1 12l5.5 2.5L9 20l2.5-5.5L17 12l-5.5-2.5zM19 15l-1.25 2.75L15 19l2.75 1.25L19 23l1.25-2.75L23 19l-2.75-1.25L19 15z"/></svg>
        </div>
        <div class="input-circle-btn" id="input-btn-attach" role="button" aria-label="Attach image">
          <svg viewBox="0 0 24 24"><path d="M16.5 6v11.5c0 2.21-1.79 4-4 4s-4-1.79-4-4V5a2.5 2.5 0 0 1 5 0v10.5c0 .55-.45 1-1 1s-1-.45-1-1V6H10v9.5a2.5 2.5 0 0 0 5 0V5c0-2.21-1.79-4-4-4S7 2.79 7 5v12.5c0 3.04 2.46 5.5 5.5 5.5s5.5-2.46 5.5-5.5V6h-1.5z"/></svg>
        </div>
        <div class="input-circle-btn" id="input-btn-fullscreen" role="button" aria-label="Fullscreen editor">
          <svg viewBox="0 0 24 24"><path d="M15 3l2.3 2.3-2.89 2.87 1.42 1.42L18.7 6.7 21 9V3zM3 9l2.3-2.3 2.87 2.89 1.42-1.42L6.7 5.3 9 3H3zm6 12l-2.3-2.3 2.89-2.87-1.42-1.42L5.3 17.3 3 15v6zm12-6l-2.3 2.3-2.87-2.89-1.42 1.42 2.89 2.87L15 21h6z"/></svg>
        </div>
        <div class="input-circle-btn" id="input-btn-guidance" role="button" aria-label="Guided generation">
          <svg viewBox="0 0 24 24"><path d="M9 5v2h6.59L4 18.59 5.41 20 17 8.41V15h2V5H9z"/></svg>
        </div>
        <div class="input-circle-btn" id="input-btn-quick" role="button" aria-label="Quick replies">
          <svg viewBox="0 0 24 24"><path d="M6.41 6L5 7.41 9.58 12 5 16.59 6.41 18l6-6zm6 0L11 7.41 15.58 12 11 16.59 12.41 18l6-6z"/></svg>
        </div>
      </div>
      <div class="input-send-btn" id="input-btn-send" role="button" aria-label="Send">
        <svg id="input-send-icon" viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
      </div>
    </div>

    <input type="file" id="input-file" accept="image/png,image/jpeg,image/webp" style="display:none" />
  </div>

  <script type="module" src="formatter/index.js"></script>
  <script src="RollingNumber.js"></script>
  <script type="module" src="renderer/index.js"></script>
  <script src="useVirtualScroll.js"></script>
  <script src="glaze_sdk.js"></script>
  <script type="module" src="bridge/index.js"></script>
</body>
</html>
