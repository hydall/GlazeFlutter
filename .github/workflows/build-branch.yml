name: Build Release

on:
  workflow_dispatch:
    # The branch to build is chosen with GitHub's native "Use workflow from"
    # branch selector (a dropdown of all available branches). Its value is
    # exposed as github.ref_name and used for checkout, the in-app build label
    # and the Telegram message.
    inputs:
      post_to_telegram:
        description: 'Post build to Telegram'
        required: false
        default: true
        type: boolean
      notify_people:
        # NOTE: GitHub's workflow_dispatch form cannot show/hide an input based
        # on another one, so this toggle is always visible. It only has an
        # effect when "Post build to Telegram" above is enabled.
        description: 'Mention people in Telegram (only if posting is enabled)'
        required: false
        default: false
        type: boolean
      dm_developers:
        # Sends the APK + IPA straight to each developer's private Telegram chat
        # (@frostake, @All_Systems_Go). Independent of "Post build to Telegram":
        # it can be used on its own for an internal test share. Requires the
        # TG_DEV_CHAT_IDS secret (numeric chat IDs) — see the "Send build to
        # developers (DM)" step below for why @usernames can't be used.
        description: 'Отправить в ЛС разработчикам (@frostake, @All_Systems_Go)'
        required: false
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  # ── shared metadata ────────────────────────────────────────────────────────
  metadata:
    runs-on: ubuntu-latest
    outputs:
      version:      ${{ steps.meta.outputs.version }}
      build_date:   ${{ steps.meta.outputs.build_date }}
      build_branch: ${{ steps.meta.outputs.build_branch }}
      file_slug:    ${{ steps.meta.outputs.file_slug }}
      commits:      ${{ steps.meta.outputs.commits }}
      git_sha:      ${{ steps.meta.outputs.git_sha }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0

      - name: Compute metadata
        id: meta
        run: |
          VERSION=$(grep '^version:' pubspec.yaml | awk '{print $2}' | sed 's/+.*//' | sed 's/-.*//')
          BUILD_DATE=$(date -u '+%d/%m/%Y %H:%M')
          BUILD_BRANCH="${{ github.ref_name }}"
          # Branch names may contain "/" or spaces which are unsafe in file
          # names, so build a sanitised slug for the artifact file name.
          SAFE_BRANCH=$(echo "$BUILD_BRANCH" | sed 's#[/ ]#-#g')
          FILE_SLUG="G-$(date -u '+%d%m%Y-%H%M')-$SAFE_BRANCH"

          echo "version=$VERSION"           >> $GITHUB_OUTPUT
          echo "build_date=$BUILD_DATE"      >> $GITHUB_OUTPUT
          echo "build_branch=$BUILD_BRANCH"  >> $GITHUB_OUTPUT
          echo "file_slug=$FILE_SLUG"        >> $GITHUB_OUTPUT
          echo "git_sha=$(git rev-parse HEAD)" >> $GITHUB_OUTPUT

          # Commits since last build tag
          git fetch --tags --force
          if git rev-parse refs/tags/build/last >/dev/null 2>&1; then
            COMMIT_LOG=$(git log build/last..HEAD --oneline --no-merges 2>/dev/null || true)
          else
            COMMIT_LOG=$(git log -10 --oneline --no-merges 2>/dev/null || true)
          fi

          COUNT=$(echo "$COMMIT_LOG" | grep -c '[^[:space:]]' || true)

          if [ "$COUNT" -eq 0 ]; then
            COMMITS_TEXT=""
          else
            FORMATTED=$(echo "$COMMIT_LOG" | head -10 \
              | sed 's/^[a-f0-9]\{7,\} //' \
              | sed 's/&/\&amp;/g; s/</\&lt;/g; s/>/\&gt;/g' \
              | sed 's/^/• /')
            if [ "$COUNT" -gt 10 ]; then
              EXTRA=$((COUNT - 10))
              COMMITS_TEXT=$(printf '%s\n+%d коммитов' "$FORMATTED" "$EXTRA")
            else
              COMMITS_TEXT="$FORMATTED"
            fi
          fi

          echo "commits<<DELIM" >> $GITHUB_OUTPUT
          echo "$COMMITS_TEXT"  >> $GITHUB_OUTPUT
          echo "DELIM"          >> $GITHUB_OUTPUT

  # ── android ────────────────────────────────────────────────────────────────
  build-android:
    needs: metadata
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}

      - name: Create .env from secrets
        run: |
          echo "DROPBOX_APP_KEY=${{ secrets.DROPBOX_APP_KEY }}" >> .env
          echo "DROPBOX_REDIRECT_NATIVE=${{ secrets.DROPBOX_REDIRECT_NATIVE }}" >> .env
          echo "GDRIVE_CLIENT_ID=${{ secrets.GDRIVE_CLIENT_ID }}" >> .env
          echo "GDRIVE_REDIRECT_NATIVE=com.hydall.glaze://oauth/gdrive" >> .env

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            .android/build-cache
          key: gradle-${{ runner.os }}-${{ hashFiles('android/**/*.gradle*', 'android/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Cache pub
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: pub-${{ runner.os }}-${{ hashFiles('pubspec.lock') }}
          restore-keys: pub-${{ runner.os }}-

      - name: Install dependencies
        run: flutter pub get

      - name: Generate code
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Build APK (arm64 only)
        env:
          KEYSTORE_BASE64: ${{ secrets.DEBUG_KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: android
          KEY_ALIAS: debug-key
          KEY_PASSWORD: android
        run: >
          flutter build apk --release --no-pub --target-platform android-arm64
          "--dart-define=APP_VERSION=${{ needs.metadata.outputs.version }}"
          "--dart-define=BUILD_DATE=${{ needs.metadata.outputs.build_date }}"
          "--dart-define=BUILD_BRANCH=${{ needs.metadata.outputs.build_branch }}"
          "--dart-define=BUILD_COMMIT=${{ needs.metadata.outputs.git_sha }}"

      - name: Rename APK
        run: mv build/app/outputs/flutter-apk/app-release.apk "build/app/outputs/flutter-apk/${{ needs.metadata.outputs.file_slug }}.apk"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Glaze-release-APK
          path: "build/app/outputs/flutter-apk/${{ needs.metadata.outputs.file_slug }}.apk"

  # ── windows ────────────────────────────────────────────────────────────────
  build-windows:
    needs: metadata
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}

      - name: Create .env from secrets
        shell: bash
        run: |
          echo "DROPBOX_APP_KEY=${{ secrets.DROPBOX_APP_KEY }}" >> .env
          echo "DROPBOX_REDIRECT_NATIVE=${{ secrets.DROPBOX_REDIRECT_NATIVE }}" >> .env
          echo "GDRIVE_CLIENT_ID=${{ secrets.GDRIVE_CLIENT_ID }}" >> .env
          echo "GDRIVE_REDIRECT_NATIVE=com.hydall.glaze://oauth/gdrive" >> .env

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Cache pub
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: pub-${{ runner.os }}-${{ hashFiles('pubspec.lock') }}
          restore-keys: pub-${{ runner.os }}-

      - name: Install dependencies
        run: flutter pub get

      - name: Generate code
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Build Windows (release)
        run: >
          flutter build windows --release --no-pub
          "--dart-define=APP_VERSION=${{ needs.metadata.outputs.version }}"
          "--dart-define=BUILD_DATE=${{ needs.metadata.outputs.build_date }}"
          "--dart-define=BUILD_BRANCH=${{ needs.metadata.outputs.build_branch }}"
          "--dart-define=BUILD_COMMIT=${{ needs.metadata.outputs.git_sha }}"

      - name: Upload Windows
        uses: actions/upload-artifact@v4
        with:
          name: Glaze-release-Windows
          path: build/windows/x64/runner/Release/**
          include-hidden-files: true

  # ── ios ────────────────────────────────────────────────────────────────────
  build-ios:
    needs: metadata
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}

      - name: Create .env from secrets
        run: |
          echo "DROPBOX_APP_KEY=${{ secrets.DROPBOX_APP_KEY }}" >> .env
          echo "DROPBOX_REDIRECT_NATIVE=${{ secrets.DROPBOX_REDIRECT_NATIVE }}" >> .env
          echo "GDRIVE_CLIENT_ID=${{ secrets.GDRIVE_CLIENT_ID }}" >> .env
          echo "GDRIVE_REDIRECT_NATIVE=com.hydall.glaze://oauth/gdrive" >> .env

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Cache pub
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: pub-${{ runner.os }}-${{ hashFiles('pubspec.lock') }}
          restore-keys: pub-${{ runner.os }}-

      - name: Cache CocoaPods
        uses: actions/cache@v4
        with:
          path: ios/Pods
          key: pods-${{ runner.os }}-${{ hashFiles('ios/Podfile.lock') }}
          restore-keys: pods-${{ runner.os }}-

      - name: Install dependencies
        run: flutter pub get

      - name: Generate code
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Install CocoaPods
        run: cd ios && pod install && cd ..

      # === Reverted iOS IPA creation (the version that produced working sideload builds before PR 96) ===
      # We are reverting the "flutter build ipa" change introduced in 195b260 because it regressed the build
      # between good build ~43 and the failing 46/47. Adding heavy diagnostics to find the real cause.
      - name: Build iOS (release, no signing) — DIAGNOSTIC
        run: |
          set -x
          flutter build ios --release --no-codesign --no-pub \
            "--dart-define=APP_VERSION=${{ needs.metadata.outputs.version }}" \
            "--dart-define=BUILD_DATE=${{ needs.metadata.outputs.build_date }}" \
            "--dart-define=BUILD_BRANCH=${{ needs.metadata.outputs.build_branch }}" \
            "--dart-define=BUILD_COMMIT=${{ needs.metadata.outputs.git_sha }}"
          echo "=== AFTER flutter build ios ==="
          find build/ios -type f -name "*.app" -o -name "*.ipa" 2>/dev/null | head -20 || true
          ls -laR build/ios/iphoneos 2>/dev/null | tail -30 || true
          echo "=== END DIAGNOSTIC ==="

      - name: Create IPA (manual Payload method — last known good for sideloading)
        run: |
          set -x
          mkdir -p Payload
          if [ -d "build/ios/iphoneos" ]; then
            cp -r build/ios/iphoneos/*.app Payload/ 2>/dev/null || true
          fi
          find build -type d -name "*.app" 2>/dev/null | head -5 | while read app; do
            echo "Found app at: $app"
            cp -r "$app" Payload/ 2>/dev/null || true
          done
          echo "=== Payload contents before zip ==="
          find Payload -type f | head -30
          ls -la Payload
          zip -r "${{ needs.metadata.outputs.file_slug }}.ipa" Payload || (echo "zip failed, contents:"; find . -name "*.app" 2>/dev/null | head -10)
          echo "=== Final artifact check ==="
          ls -la *.ipa 2>/dev/null || true

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: Glaze-release-iOS
          path: "${{ needs.metadata.outputs.file_slug }}.ipa"

  # ── telegram notify ────────────────────────────────────────────────────────
  notify:
    needs: [metadata, build-android, build-ios]
    runs-on: ubuntu-latest
    # Run when either delivery toggle is on: the group post and/or the direct
    # messages to developers. Each individual step is gated on its own toggle.
    if: >-
      ${{ success() &&
      (github.event.inputs.post_to_telegram == 'true' ||
       github.event.inputs.dm_developers == 'true') }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}

      - name: Download APK
        uses: actions/download-artifact@v4
        with:
          name: Glaze-release-APK
          path: artifacts/

      - name: Download IPA
        uses: actions/download-artifact@v4
        with:
          name: Glaze-release-iOS
          path: artifacts/

      - name: Send to Telegram
        # Group post — only when the "Post build to Telegram" toggle is on.
        if: ${{ github.event.inputs.post_to_telegram == 'true' }}
        env:
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID:   ${{ secrets.TG_CHAT_ID }}
          TG_MENTIONS:  ${{ secrets.TG_MENTIONS }}
          NOTIFY_PEOPLE: ${{ github.event.inputs.notify_people || 'true' }}
          VERSION:      ${{ needs.metadata.outputs.version }}
          BUILD_DATE:   ${{ needs.metadata.outputs.build_date }}
          BUILD_BRANCH: ${{ needs.metadata.outputs.build_branch }}
          FILE_SLUG:    ${{ needs.metadata.outputs.file_slug }}
          COMMITS:      ${{ needs.metadata.outputs.commits }}
        run: |
          COMMITS_SECTION=""
          if [ -n "$COMMITS" ]; then
            COMMITS_SECTION=$(printf '\n\n%s' "$COMMITS")
          fi

          MENTIONS_SECTION=""
          if [ "$NOTIFY_PEOPLE" = "true" ] && [ -n "$TG_MENTIONS" ]; then
            MENTIONS_SECTION=$(printf '\n\n<tg-spoiler>%s</tg-spoiler>' "$TG_MENTIONS")
          fi

          TEXT=$(printf 'Новый дев-билд:\n\n%s\n%s\n%s%s%s' \
            "$VERSION" "$BUILD_DATE" "$BUILD_BRANCH" \
            "$COMMITS_SECTION" "$MENTIONS_SECTION")

          MSG_ID=$(curl -s -X POST "https://api.telegram.org/bot${TG_BOT_TOKEN}/sendMessage" \
            -H "Content-Type: application/json" \
            -d "$(jq -n --arg cid "$TG_CHAT_ID" --arg text "$TEXT" \
              '{chat_id: $cid, text: $text, parse_mode: "HTML"}')" \
            | jq -r '.result.message_id')

          curl -s -X POST "https://api.telegram.org/bot${TG_BOT_TOKEN}/pinChatMessage" \
            -H "Content-Type: application/json" \
            -d "$(jq -n --arg cid "$TG_CHAT_ID" --arg mid "$MSG_ID" \
              '{chat_id: $cid, message_id: ($mid | tonumber), disable_notification: true}')"

          curl -s -X POST "https://api.telegram.org/bot${TG_BOT_TOKEN}/sendDocument" \
            -F "chat_id=${TG_CHAT_ID}" \
            -F "reply_to_message_id=${MSG_ID}" \
            -F "document=@artifacts/${FILE_SLUG}.ipa"

          curl -s -X POST "https://api.telegram.org/bot${TG_BOT_TOKEN}/sendDocument" \
            -F "chat_id=${TG_CHAT_ID}" \
            -F "reply_to_message_id=${MSG_ID}" \
            -F "document=@artifacts/${FILE_SLUG}.apk"

      - name: Send build to developers (DM)
        # Direct-message the APK + IPA to each developer's private chat when the
        # "Отправить в ЛС разработчикам" toggle is on.
        if: ${{ github.event.inputs.dm_developers == 'true' }}
        env:
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          # Numeric Telegram chat IDs of the developers (@frostake,
          # @All_Systems_Go), whitespace- or comma-separated. The Bot API cannot
          # start a private chat by @username, so each developer must have sent
          # /start to the bot once and their numeric id stored in this secret.
          TG_DEV_CHAT_IDS: ${{ secrets.TG_DEV_CHAT_IDS }}
          VERSION:      ${{ needs.metadata.outputs.version }}
          BUILD_DATE:   ${{ needs.metadata.outputs.build_date }}
          BUILD_BRANCH: ${{ needs.metadata.outputs.build_branch }}
          FILE_SLUG:    ${{ needs.metadata.outputs.file_slug }}
          COMMITS:      ${{ needs.metadata.outputs.commits }}
        run: |
          if [ -z "$TG_DEV_CHAT_IDS" ]; then
            echo "::warning::TG_DEV_CHAT_IDS secret is empty — skipping developer DMs."
            exit 0
          fi

          COMMITS_SECTION=""
          if [ -n "$COMMITS" ]; then
            COMMITS_SECTION=$(printf '\n\n%s' "$COMMITS")
          fi

          TEXT=$(printf 'Новый дев-билд (в ЛС):\n\n%s\n%s\n%s%s' \
            "$VERSION" "$BUILD_DATE" "$BUILD_BRANCH" "$COMMITS_SECTION")

          # Accept commas or whitespace as separators between chat IDs.
          IDS=$(printf '%s' "$TG_DEV_CHAT_IDS" | tr ',' ' ')
          for CID in $IDS; do
            [ -z "$CID" ] && continue

            MSG_ID=$(curl -s -X POST "https://api.telegram.org/bot${TG_BOT_TOKEN}/sendMessage" \
              -H "Content-Type: application/json" \
              -d "$(jq -n --arg cid "$CID" --arg text "$TEXT" \
                '{chat_id: $cid, text: $text, parse_mode: "HTML"}')" \
              | jq -r '.result.message_id')

            curl -s -X POST "https://api.telegram.org/bot${TG_BOT_TOKEN}/sendDocument" \
              -F "chat_id=${CID}" \
              -F "reply_to_message_id=${MSG_ID}" \
              -F "document=@artifacts/${FILE_SLUG}.ipa"

            curl -s -X POST "https://api.telegram.org/bot${TG_BOT_TOKEN}/sendDocument" \
              -F "chat_id=${CID}" \
              -F "reply_to_message_id=${MSG_ID}" \
              -F "document=@artifacts/${FILE_SLUG}.apk"
          done

      - name: Advance build/last tag
        # Tied to the official group announcement — an internal dev-only DM share
        # must not advance the changelog baseline.
        if: ${{ github.event.inputs.post_to_telegram == 'true' }}
        run: |
          git tag -f build/last
          git push origin refs/tags/build/last --force
